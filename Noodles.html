    <script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price) {
    let item = cart.find(i => i.name === name);
    if (item) {
        item.quantity++;
    } else {
        cart.push({
            name,
            price,
            quantity: 1
        });
    }
    saveCart();
    alert("🛒 Item added to cart!");
}
</script>
